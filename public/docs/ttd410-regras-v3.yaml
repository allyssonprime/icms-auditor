# ============================================================
# TTD 410 — Regras de Auditoria ICMS v3.2 (DEFINITIVO)
# Prime Internacional (CNPJ 08.214.494/0001-19 e /0003-80)
# ============================================================
# Paradigma: ALÍQUOTAS PERMITIDAS (lista), não alíquota esperada
# Engine: first-match-wins — vedações primeiro, específicas depois
# Erro = alíquota destacada NÃO está na lista de permitidas
# ============================================================

meta:
  versao: "3.2"
  base_legal: "TTD 410 — Termo de Concessão 245000003024507"
  fase: "2a_fase"
  fundos_pct: 0.4
  difal: "fora_do_escopo"
  data_atualizacao: "2026-04-15"  # B3_GERAL corrigido para [4, 10]

# ============================================================
# VEDAÇÕES (checar ANTES de qualquer cenário)
# ============================================================
vedacoes:

  - id: V01
    descricao: "NCM no Decreto 2.128/2009"
    filtro: ncm_decreto_2128
    permitidas: []
    erro: "TTD proibido para esta NCM (Decreto 2.128/2009)"
    ref_ttd: "2.2.a"

  - id: V01-EXC
    descricao: "Exceção V01: interna SC com alíq >= 10%"
    filtro: ncm_decreto_2128 AND operacao=INTERNA AND aliq>=10
    tipo: AVISO
    erro: "NCM Decreto 2.128 mas alíquota >= 10% — possível autorização específica"
    ref_ttd: "2.2.a"

# Vedações 2.5.a/b cobertas por B9/B10 via listas de CNPJs
# Mercadoria usada (2.2.b / CFOP 5922/6922) não identificável via XML

